name: Daily Gerrit Monitor
on:
  schedule:
    # Run daily at 9:00 AM UTC (2:30 PM IST)
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write  # Required to commit and push changes

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Gerrit monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python monitor.py
      
      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add GERRIT_DAILY_REPORT.md
          git diff --staged --quiet || git commit -m "📊 Daily Gerrit Activity Report - $(date +'%Y-%m-%d')"
          git push
      
      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gerrit-daily-report
          path: GERRIT_DAILY_REPORT.md
          retention-days: 30
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: |
            *.log
          retention-days: 7